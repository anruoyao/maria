publishTimelinesDescription: 啟用後，未登入的使用者可於 {url} 查看本地時間軸及公開時間軸。
searchWordsDescription: "請在此欄位輸入欲搜尋的關鍵字。以空格分隔關鍵字以進行AND搜尋，在關鍵字之間插入「OR」以進行OR搜尋。\n舉例來說，輸入「早上
  晚上」會搜尋包含「早上」和「晚上」的貼文，「早上 OR 晚上」會搜尋包含「早上」或「晚上」（或兩者皆包含）的貼文。\n您也可以同時進行AND搜尋及OR搜尋，例如「(早上
  OR 晚上) 想睡覺」。\n如欲搜尋包含空白的字串，請使用雙引號 (\") 以與AND搜尋進行區別，例如「\"Today I learned\"」。\n\n如欲前往特定使用者或貼文的頁面，請在此欄位輸入使用者ID（@user@example.com）或貼文的URL，並點擊「查詢」按鈕。點擊「搜尋」按鈕則會搜尋字面上包含輸入的ID或URL的貼文。"
searchUsersDescription: "如欲搜尋特定使用者的貼文，請以「@user@example.com（本地使用者則為 @user）」的格式輸入發文者的ID，或輸入網域名稱（example.com）以搜尋特定伺服器的貼文。\n\
  \n輸入「me」以搜尋自己的所有貼文（包含不在主頁顯示、追隨者、指定使用者、祕密貼文）。\n\n輸入「local」以搜尋本地伺服器的貼文。"
searchRangeDescription: "如欲搜尋特定期間的貼文，請以「20220615-20231031」的格式輸入日期範圍。\n\n今年的日期可省略年份（例如0105-0106、20231105-0110）。\n\
  \n開始日期和結果日期可擇一省略。舉例來說，「-0102」表示僅搜尋今年1月2日為止的貼文，「20231026-」表示僅搜尋2023年10月26日以後的貼文。"
