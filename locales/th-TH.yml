  คั่นด้วยการขึ้นบรรทัดใหม่เพื่อแสดงแบบสุ่มทุกครั้งที่ผู้ใช้โหลดเว็บหรือโหลดหน้าเว็บซ้ำ
  โปรดตรวจสอบว่ารูปภาพอยู่ใน URL แบบคงที่ และควรปรับขนาดทั้งหมดเป็น 192x192
